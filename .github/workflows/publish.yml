# Publish steward to PyPI on version tags (v0.12.0, v1.0.0, etc.)
#
# Uses Trusted Publishers — no API tokens needed.
# Setup: https://docs.pypi.org/trusted-publishers/adding-a-publisher/
#
# Configure Trusted Publisher on PyPI:
#   Owner: kimeisele
#   Repository: steward
#   Workflow: publish.yml
#   Environment: pypi

name: Publish to PyPI

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    name: Build distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build tools
        run: pip install build

      - name: Build wheel and sdist
        run: python -m build

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
