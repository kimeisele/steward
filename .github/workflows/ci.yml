# Steward CI — run tests + lint on every push and PR

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          pip install steward-protocol[providers]
          pip install -e ".[providers,search,api,dev]"
          pip install ruff

      - name: Run tests
        run: python -m pytest tests/ -x -q --timeout=30

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ruff
        run: pip install ruff

      - name: Ruff check (steward + tests)
        run: ruff check steward/ tests/ --select=E9,F63,F7,F82 --output-format=github

      - name: Ruff format check (steward + tests)
        run: ruff format --check steward/ tests/
